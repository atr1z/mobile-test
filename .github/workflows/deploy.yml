name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - production

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Build signed release bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :android:atriz:bundleRelease :android:fraccio:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-bundles
          path: |
            android/atriz/build/outputs/bundle/release/*.aab
            android/fraccio/build/outputs/bundle/release/*.aab

      # TODO: Upload to Google Play when signing credentials are configured
      # - name: Upload to Google Play
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
      #     packageName: mx.atriz
      #     releaseFiles: android/atriz/build/outputs/bundle/release/*.aab
      #     track: internal

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Build shared framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      # TODO: Set up Apple certificates and provisioning profiles
      # - name: Install Apple certificate and provisioning profile
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      #   run: |
      #     # Decode and install certificate and profile

      - name: Archive atriz
        run: |
          xcodebuild archive \
            -project ios/ios.xcodeproj \
            -scheme atriz \
            -archivePath build/atriz.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive fraccio
        run: |
          xcodebuild archive \
            -project ios/ios.xcodeproj \
            -scheme fraccio \
            -archivePath build/fraccio.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-archives
          path: build/*.xcarchive

      # TODO: Export IPA and upload to App Store when signing is configured
      # - name: Export IPA
      #   run: |
      #     xcodebuild -exportArchive \
      #       -archivePath build/atriz.xcarchive \
      #       -exportPath build/ipa \
      #       -exportOptionsPlist ExportOptions.plist
      # - name: Upload to App Store
      #   run: xcrun altool --upload-app -f build/ipa/atriz.ipa -t ios --apiKey $API_KEY --apiIssuer $API_ISSUER
